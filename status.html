<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Status Log — TUMO07</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --accent: #5eea91;
            --accent-glow: rgba(94, 234, 145, 0.4);
            --accent-red: #f87171;
            --accent-blue: #60a5fa;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --glass-bg: rgba(15, 15, 20, 0.15);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(60px) saturate(200%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-color);
            background-image: url('assets/hero_bg.jpg?v=3');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Ambient Mesh Gradient Background */
        .ambient-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: -2;
            background: linear-gradient(180deg, rgba(3,3,5,0.4) 0%, rgba(3,3,5,0.8) 100%);
        }
        @keyframes pulseBg {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* Noise Texture */
        .noise {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.04; z-index: -1; pointer-events: none;
        }

        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            padding: 24px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(180deg, rgba(3,3,5,0.9) 0%, transparent 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; text-decoration: none; color: #fff;}
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.7; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; text-shadow: 0 0 12px rgba(255,255,255,0.4); }
        
        .container {
            position: relative; z-index: 10;
            max-width: 900px;
            margin: 140px auto 100px;
            padding: 0 5%;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }
        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(40px, 8vw, 64px);
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 16px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            font-size: 18px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .log-container {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 30px 60px rgba(0,0,0,0.6);
        }
        .log-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.3s;
        }
        .log-item:hover { background: rgba(255,255,255,0.02); }
        .log-item:last-child { border-bottom: none; }
        
        .log-time {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
        }
        
        .status-badge {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 16px; border-radius: 100px;
            font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
            font-family: 'JetBrains Mono', monospace;
        }
        .status-online {
            background: rgba(94, 234, 145, 0.05);
            color: #fff;
            border: 1px solid rgba(94, 234, 145, 0.3);
        }
        .status-offline {
            background: rgba(248, 113, 113, 0.05);
            color: #fff;
            border: 1px solid rgba(248, 113, 113, 0.3);
        }
        .loading {
            padding: 60px;
            text-align: center;
            color: var(--text-muted);
            font-size: 16px;
        }

        footer {
            padding: 40px 5%;
            margin-top: 80px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
            color: var(--text-muted); font-size: 13px;
        }
        .footer-logo { font-family: 'Outfit', sans-serif; font-weight: 800; color: #fff; font-size: 18px; }

        @media (max-width: 600px) {
            .log-item { flex-direction: column; align-items: flex-start; gap: 12px; }
            nav { padding: 20px 5%; }
            footer { flex-direction: column; gap: 16px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="noise"></div>

    <nav>
        <a href="index.html" class="logo">TUMO<span>07</span></a>
        <div class="nav-links">
            <a href="index.html">← Return Home</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="header">
            <h1>Telemetry Logs</h1>
            <p>0-millisecond real-time server history powered by Firebase.</p>
        </div>
        
        <div class="log-container" id="log-list">
            <div class="loading">Synchronizing with Firebase...</div>
        </div>
    </div>

    <footer>
        <div>&copy; 2026 TUMO07 Server. All rights reserved.</div>
        <div class="footer-logo">TUMO<span style="color: var(--accent);">07</span></div>
    </footer>

    <script>
        async function loadLogs() {
            const list = document.getElementById('log-list');
            try {
                // Firebase is purely the event history log
                const logResponse = await fetch('https://tumo07-status-default-rtdb.firebaseio.com/logs.json');
                let logsObj = await logResponse.json();
                let logs = [];
                if (Array.isArray(logsObj)) {
                    logs = logsObj.filter(l => l !== null);
                } else if (logsObj && typeof logsObj === 'object') {
                    logs = Object.values(logsObj).filter(l => l !== null);
                }
                
                if (logs.length === 0) {
                    list.innerHTML = '<div class="loading">No logs recorded yet.</div>';
                    return;
                }
                
                let html = '';
                logs.reverse().forEach(log => {
                    const statusClass = log.online ? 'status-online' : 'status-offline';
                    let statusText = log.event_message || (log.online ? `Online (${log.players} players)` : 'Offline');
                    const dotColor = log.online ? 'var(--accent)' : '#f87171';
                    
                    let displayTime = log.timestamp;
                    if (displayTime) {
                        // More robust parsing: find "YYYY-MM-DD HH:MM" and assume UTC
                        let match = displayTime.match(/(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2})/);
                        if (match) {
                            let dateStr = `${match[1]}T${match[2]}:00Z`;
                            let d = new Date(dateStr);
                            if (!isNaN(d.getTime())) {
                                let offset7 = d.getTime() + (7 * 60 * 60 * 1000);
                                let d7 = new Date(offset7);
                                let yyyy = d7.getUTCFullYear();
                                let mm = String(d7.getUTCMonth() + 1).padStart(2, '0');
                                let dd = String(d7.getUTCDate()).padStart(2, '0');
                                let hh = String(d7.getUTCHours()).padStart(2, '0');
                                let min = String(d7.getUTCMinutes()).padStart(2, '0');
                                displayTime = `${yyyy}-${mm}-${dd} ${hh}:${min} (UTC+7)`;
                            }
                        }
                    }

                    html += `
                        <div class="log-item">
                            <span class="log-time">${displayTime}</span>
                            <div class="status-badge ${statusClass}">
                                <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:${dotColor}; box-shadow: 0 0 10px ${dotColor}"></span>
                                ${statusText}
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } catch (error) {
                list.innerHTML = '<div class="loading" style="color:var(--accent-red)">Error loading logs. Database might be unreachable.</div>';
            }
        }
        
        loadLogs();
        setInterval(loadLogs, 10000);
    </script>
</body>
</html>
